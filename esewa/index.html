<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta name="theme-color" content="#60bb46">
  <title>Opening eSewa</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#f0fdf4 0%,#dcfce7 100%);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#111827}
    .card{width:min(100%,390px);background:#fff;border-radius:24px;box-shadow:0 10px 36px rgba(0,0,0,.12);padding:34px 28px;text-align:center}
    .logo{width:72px;height:72px;border-radius:20px;background:#60bb46;margin:0 auto 20px;display:grid;place-items:center;color:#fff;font-size:40px;font-weight:900;box-shadow:0 8px 24px rgba(96,187,70,.35)}
    h1{margin:0 0 10px;font-size:22px}
    p{margin:0;color:#64748b;line-height:1.5}
    .spinner{width:30px;height:30px;margin:26px auto 14px;border:3px solid #dcfce7;border-top-color:#60bb46;border-radius:50%;animation:spin .75s linear infinite}
    .status{color:#60bb46;font-size:14px;font-weight:600}
    .secure{margin-top:22px;color:#94a3b8;font-size:12px}
    .error{display:none;margin-top:18px;color:#dc2626;font-size:14px;line-height:1.5}
    button{display:none;margin-top:18px;width:100%;border:0;border-radius:14px;padding:14px 18px;background:#60bb46;color:#fff;font-size:16px;font-weight:700}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">e</div>
    <h1>Opening eSewa</h1>
    <p id="message">Redirecting you securely to complete your payment. Please do not close this page.</p>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Connecting to eSewa…</div>
    <div class="secure">Secured by eSewa Payment Gateway</div>
    <div class="error" id="error"></div>
    <button id="continueBtn" type="button">Continue to eSewa</button>
  </div>

  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const sessionUrl = params.get('sessionUrl');
      const errorEl = document.getElementById('error');
      const button = document.getElementById('continueBtn');
      const spinner = document.getElementById('spinner');
      const statusEl = document.getElementById('status');
      const messageEl = document.getElementById('message');

      function showManual(form) {
        spinner.style.display = 'none';
        statusEl.style.display = 'none';
        button.style.display = 'inline-block';
        button.onclick = () => form.submit();
        messageEl.textContent = 'Tap the button below to continue to eSewa.';
      }

      function showError(message) {
        spinner.style.display = 'none';
        statusEl.style.display = 'none';
        errorEl.style.display = 'block';
        errorEl.textContent = message;
      }

      if (!sessionUrl) {
        showError('Missing payment session. Please go back to the app and try again.');
        return;
      }

      try {
        const response = await fetch(sessionUrl, {
          method: 'GET',
          headers: { 'Accept': 'application/json' },
          cache: 'no-store',
        });

        if (!response.ok) {
          const text = await response.text();
          showError(text || 'Could not prepare the payment session.');
          return;
        }

        const payload = await response.json();
        if (!payload.form_url || !payload.form_fields) {
          showError('Payment session is incomplete. Please try again.');
          return;
        }

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = payload.form_url;
        form.style.display = 'none';

        Object.entries(payload.form_fields).forEach(([name, value]) => {
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = name;
          input.value = String(value ?? '');
          form.appendChild(input);
        });

        document.body.appendChild(form);

        setTimeout(() => {
          try {
            form.submit();
          } catch (_) {
            showManual(form);
          }
        }, 600);
      } catch (error) {
        showError('Could not connect to the payment gateway. Please check your connection and try again.');
      }
    })();
  </script>
</body>
</html>
