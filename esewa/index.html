<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening eSewa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: linear-gradient(160deg, #0d1f17 0%, #163929 100%);
      color: #fff;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: rgba(20, 20, 20, 0.88);
      border-radius: 24px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
    }
    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2f8f2f;
      color: #fff;
      font-size: 38px;
      font-weight: 900;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    p { color: #d1d5db; line-height: 1.5; margin-bottom: 18px; }
    .spinner-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #8ee28e;
      font-weight: 600;
      margin-bottom: 18px;
    }
    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255,255,255,.18);
      border-top-color: #8ee28e;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .debug {
      margin-top: 12px;
      font-size: 12px;
      color: #9ca3af;
      word-break: break-word;
      text-align: left;
      display: none;
    }
    .error {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: #3a1313;
      color: #fecaca;
      text-align: left;
      font-size: 14px;
      line-height: 1.45;
    }
    .btn {
      display: none;
      margin-top: 18px;
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: #60bb46;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">e</div>
    <h1>Opening eSewa</h1>
    <p id="statusText">Redirecting you securely to eSewa…</p>

    <div class="spinner-wrap" id="spinnerWrap">
      <div class="spinner"></div>
      <span id="spinnerLabel">Connecting to server</span>
    </div>

    <div class="error" id="errorBox"></div>
    <button class="btn" id="continueBtn">Continue to eSewa</button>
    <div class="debug" id="debugBox"></div>

    <form id="esewaForm" method="POST" style="display:none;"></form>
  </div>

  <script>
    const statusText = document.getElementById('statusText');
    const spinnerLabel = document.getElementById('spinnerLabel');
    const errorBox = document.getElementById('errorBox');
    const continueBtn = document.getElementById('continueBtn');
    const debugBox = document.getElementById('debugBox');
    const esewaForm = document.getElementById('esewaForm');

    let submitPrepared = false;

    function debug(msg) {
      debugBox.style.display = 'block';
      debugBox.textContent += (debugBox.textContent ? '\n' : '') + msg;
      console.log(msg);
    }

    function showError(message) {
      statusText.textContent = 'We could not continue to eSewa.';
      spinnerLabel.textContent = 'Stopped';
      errorBox.style.display = 'block';
      errorBox.textContent = message;
      continueBtn.style.display = submitPrepared ? 'block' : 'none';
      debug('ERROR: ' + message);
    }

    function prepareForm(formUrl, formFields) {
      esewaForm.action = formUrl;
      esewaForm.innerHTML = '';

      Object.entries(formFields).forEach(([key, value]) => {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = String(value ?? '');
        esewaForm.appendChild(input);
      });

      submitPrepared = true;
      continueBtn.style.display = 'block';
      continueBtn.onclick = () => {
        spinnerLabel.textContent = 'Opening eSewa';
        esewaForm.submit();
      };
    }

    async function start() {
      try {
        const currentUrl = new URL(window.location.href);
        const sessionUrl = currentUrl.searchParams.get('sessionUrl');

        debug('Page loaded');
        debug('sessionUrl present: ' + Boolean(sessionUrl));

        if (!sessionUrl) {
          showError('Missing sessionUrl in checkout link.');
          return;
        }

        spinnerLabel.textContent = 'Connecting to server';
        const res = await fetch(sessionUrl, {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });

        debug('session fetch status: ' + res.status);

        const raw = await res.text();
        debug('session response length: ' + raw.length);

        let data;
        try {
          data = JSON.parse(raw);
        } catch (_) {
          showError('Session endpoint returned invalid JSON.');
          return;
        }

        if (!res.ok) {
          showError(data.error || `Session request failed (${res.status}).`);
          return;
        }

        if (!data.form_url || !data.form_fields || typeof data.form_fields !== 'object') {
          showError('Session response is incomplete.');
          return;
        }

        debug('form_url received: ' + data.form_url);

        prepareForm(data.form_url, data.form_fields);

        statusText.textContent = 'Redirecting you securely to eSewa…';
        spinnerLabel.textContent = 'Submitting payment form';

        setTimeout(() => {
          debug('Attempting auto-submit');
          esewaForm.submit();
        }, 500);

        setTimeout(() => {
          if (document.visibilityState === 'visible') {
            debug('Still visible after auto-submit; user tap likely needed');
            continueBtn.style.display = 'block';
          }
        }, 2000);
      } catch (err) {
        showError(`Unexpected error: ${err?.message || err}`);
      }
    }

    start();
  </script>
</body>
</html>
