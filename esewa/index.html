
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening eSewa</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: linear-gradient(160deg, #f0fdf4 0%, #dcfce7 100%);
      color: #111827;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #fff;
      border-radius: 24px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
    }
    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #60bb46;
      color: #fff;
      font-size: 38px;
      font-weight: 900;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    p {
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 22px;
    }
    .spinner-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #60bb46;
      font-weight: 600;
      margin-bottom: 18px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #d1fae5;
      border-top-color: #60bb46;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #fef2f2;
      color: #b91c1c;
      text-align: left;
      font-size: 14px;
      line-height: 1.5;
    }
    .btn {
      display: none;
      margin-top: 18px;
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: #60bb46;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">e</div>
    <h1>Opening eSewa</h1>
    <p id="statusText">Connecting to server…</p>

    <div class="spinner-wrap" id="spinnerWrap">
      <div class="spinner"></div>
      <span id="spinnerLabel">Preparing checkout</span>
    </div>

    <div class="error" id="errorBox"></div>
    <button class="btn" id="retryBtn" onclick="window.location.reload()">Try again</button>

    <form id="esewaForm" method="POST" style="display:none;"></form>
  </div>

  <script>
    const statusText = document.getElementById('statusText');
    const spinnerLabel = document.getElementById('spinnerLabel');
    const errorBox = document.getElementById('errorBox');
    const retryBtn = document.getElementById('retryBtn');
    const esewaForm = document.getElementById('esewaForm');

    function showError(message) {
      statusText.textContent = 'We could not continue to eSewa.';
      spinnerLabel.textContent = 'Stopped';
      errorBox.style.display = 'block';
      errorBox.textContent = message;
      retryBtn.style.display = 'block';
    }

    async function start() {
      try {
        const url = new URL(window.location.href);
        const sessionUrl = url.searchParams.get('sessionUrl');

        if (!sessionUrl) {
          showError('Missing sessionUrl in checkout link.');
          return;
        }

        statusText.textContent = 'Connecting to server…';
        spinnerLabel.textContent = 'Loading payment session';

        const res = await fetch(sessionUrl, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        });

        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch (_) {
          showError('Server returned invalid session data.');
          return;
        }

        if (!res.ok) {
          showError(data.error || `Session request failed (${res.status}).`);
          return;
        }

        if (!data.form_url || !data.form_fields || typeof data.form_fields !== 'object') {
          showError('Session response is incomplete.');
          return;
        }

        statusText.textContent = 'Redirecting you securely to eSewa…';
        spinnerLabel.textContent = 'Submitting payment form';

        esewaForm.action = data.form_url;

        Object.entries(data.form_fields).forEach(([key, value]) => {
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = key;
          input.value = String(value ?? '');
          esewaForm.appendChild(input);
        });

        setTimeout(() => {
          esewaForm.submit();
        }, 400);
      } catch (err) {
        showError(`Unexpected error: ${err?.message || err}`);
      }
    }

    start();
  </script>
</body>
</html>
